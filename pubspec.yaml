name: crisissync
description: "CrisisSync — Real-time crisis response and emergency coordination platform for hospitality venues."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_database: ^11.3.5
  firebase_messaging: ^15.2.5

  # Routing
  go_router: ^14.8.1

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  fl_chart: ^0.70.2

  # Maps
  google_maps_flutter: ^2.12.1
  google_maps_flutter_web: ^0.5.10

  # Utilities
  http: ^1.3.0
  intl: ^0.20.2
  uuid: ^4.5.1
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1
  provider: ^6.1.4
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

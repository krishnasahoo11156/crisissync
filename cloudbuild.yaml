steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/crisissync-web', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/crisissync-web']
  - name: 'gcr.io/google.com/cloudsdktool/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'crisissync-web'
      - '--image=gcr.io/$PROJECT_ID/crisissync-web'
      - '--platform=managed'
      - '--region=asia-south1'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--quiet'
timeout: 1200s
